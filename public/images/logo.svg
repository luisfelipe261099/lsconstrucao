<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 500" width="100%" height="100%">
  <defs>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f4d97d" />
      <stop offset="40%" stop-color="#dcb849" />
      <stop offset="100%" stop-color="#7a5c13" />
    </linearGradient>
    <linearGradient id="silverGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="50%" stop-color="#e2e8f0" />
      <stop offset="100%" stop-color="#94a3b8" />
    </linearGradient>
    
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <g transform="translate(0, 10)">
    <!-- Roof -->
    <g filter="url(#glow)">
      <!-- Left side of roof -->
      <path d="M 300 80 L 150 180 L 170 195 L 300 110 L 430 195 L 450 180 Z" fill="url(#goldGrad)" />
      <!-- Center diamond/house detail -->
      <rect x="282" y="130" width="36" height="36" fill="url(#goldGrad)" transform="rotate(45 300 148)" />
    </g>

    <!-- Letters L S -->
    <!-- L -->
    <path d="M 190 170 L 235 170 L 235 285 L 300 285 L 300 325 L 190 325 Z" fill="url(#silverGrad)" />
    
    <!-- S -->
    <text x="325" y="333" font-family="'Montserrat', system-ui, -apple-system, sans-serif" font-weight="900" font-size="200" fill="url(#silverGrad)" letter-spacing="-5">S</text>

    <!-- Texts -->
    <text x="300" y="405" font-family="'Montserrat', system-ui, -apple-system, sans-serif" font-weight="800" font-size="38" fill="url(#silverGrad)" text-anchor="middle" letter-spacing="4">CONSTRUÇÕES</text>
    
    <text x="300" y="450" font-family="'Montserrat', system-ui, -apple-system, sans-serif" font-weight="500" font-size="24" fill="url(#goldGrad)" text-anchor="middle" letter-spacing="8">&amp; REFORMAS</text>
  </g>
</svg>